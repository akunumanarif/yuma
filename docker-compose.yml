services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/temp:/app/temp
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL=http://147.93.157.196
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
